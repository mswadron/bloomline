<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bloomline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c2a1d;          /* deep botanical near-black */
    --green:#2f5233;        /* anchor green */
    --paper:#eef0e6;        /* faint green-gray page */
    --card:#f7f8f1;         /* card surface */
    --line:#d3d8c4;         /* hairline */
    --muted:#6a7560;        /* secondary text */
    --coming:#5d8a2f;       /* rising bloom */
    --peak:#c08a1c;         /* full bloom */
    --ending:#a8542a;       /* fading bloom */
    --invasive:#b23b2a;     /* alert */
    --native:#3a6b3f;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  .app{max-width:480px;margin:0 auto;padding:0 0 64px;min-height:100vh;
       background:var(--paper)}

  /* ---- header ---- */
  header{padding:26px 20px 18px;background:var(--green);color:#f3f5ea;
         border-bottom-left-radius:22px;border-bottom-right-radius:22px}
  .wordmark{font-family:"Fraunces",serif;font-weight:600;font-size:30px;
            letter-spacing:.2px;line-height:1}
  .wordmark span{font-style:italic;font-weight:400;opacity:.85}
  .tag{font-family:"Spline Sans Mono",monospace;font-size:11px;
       letter-spacing:.14em;text-transform:uppercase;opacity:.72;margin-top:6px}
  .route{display:flex;align-items:center;gap:8px;margin-top:18px;
         background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);
         padding:11px 13px;border-radius:13px;font-size:14.5px}
  .route .dot{width:8px;height:8px;border-radius:50%;background:#cfe0a8;flex:none}
  .route .arrow{opacity:.5;margin:0 2px}
  .route .from,.route .to{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:42%}
  .route .edit{margin-left:auto;font-family:"Spline Sans Mono",monospace;
               font-size:10.5px;letter-spacing:.1em;opacity:.85;cursor:pointer;
               border:1px solid rgba(255,255,255,.25);border-radius:7px;
               padding:4px 7px;flex:none;background:none;color:inherit}
  .route .edit:hover{background:rgba(255,255,255,.14)}

  /* ---- route editor ---- */
  .route-edit{display:none;margin-top:12px;background:rgba(255,255,255,.08);
              border:1px solid rgba(255,255,255,.2);border-radius:13px;padding:13px}
  .route-edit.show{display:block}
  .route-edit label{display:block;font-family:"Spline Sans Mono",monospace;
              font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
              opacity:.75;margin:0 0 4px}
  .route-edit input{width:100%;font-family:"Inter",sans-serif;font-size:14px;
              border:1px solid rgba(255,255,255,.25);border-radius:9px;
              padding:9px 11px;background:rgba(255,255,255,.95);color:var(--ink);
              margin-bottom:10px}
  .route-edit .re-row{display:flex;gap:8px;margin-top:2px}
  .route-edit .re-row button{flex:1;font-family:"Spline Sans Mono",monospace;
              font-size:11px;letter-spacing:.08em;text-transform:uppercase;
              border-radius:9px;padding:9px;cursor:pointer;border:1px solid}
  .re-go{background:#f3f5ea;color:var(--green);border-color:#f3f5ea}
  .re-cancel{background:transparent;color:#f3f5ea;border-color:rgba(255,255,255,.35)}
  .re-status{font-family:"Spline Sans Mono",monospace;font-size:10.5px;
             letter-spacing:.04em;margin-top:9px;min-height:14px;opacity:.92}
  .re-status.err{color:#ffd9cf}

  /* ---- season ribbon ---- */
  .season{padding:16px 20px 4px}
  .season .when{font-family:"Spline Sans Mono",monospace;font-size:11px;
                letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
                display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
  .season .when .today-btn{font-family:"Spline Sans Mono",monospace;font-size:10px;
                letter-spacing:.1em;text-transform:uppercase;color:var(--green);
                background:#dfe7cb;border:1px solid #c2d0a6;border-radius:6px;
                padding:3px 8px;cursor:pointer;display:none}
  .season .when .today-btn.show{display:inline-block}
  .ribbon{position:relative;height:30px;touch-action:none;cursor:pointer}
  .ribbon .months{display:flex;height:26px;border-radius:7px;overflow:hidden;
                  border:1px solid var(--line)}
  .ribbon .m{flex:1;font-family:"Spline Sans Mono",monospace;font-size:9px;
             color:var(--muted);display:flex;align-items:center;
             justify-content:center;background:var(--card);
             border-right:1px solid var(--line)}
  .ribbon .m:last-child{border-right:0}
  .ribbon .m.on{background:#dfe7cb;color:var(--green);font-weight:500}
  .ribbon .now{position:absolute;top:-3px;height:32px;width:2px;
               background:var(--ending);border-radius:2px;
               transform:translateX(-1px);touch-action:none;cursor:grab}
  .ribbon .now:active{cursor:grabbing}
  .ribbon .now::after{content:"";position:absolute;top:-5px;left:50%;
               transform:translateX(-50%);
               width:14px;height:14px;border-radius:50%;background:var(--ending);
               box-shadow:0 1px 4px rgba(0,0,0,.25);border:2px solid #f3f5ea}
  .ribbon .now::before{content:"";position:absolute;top:-13px;left:50%;
               transform:translateX(-50%);border-left:4px solid transparent;
               border-right:4px solid transparent;border-top:5px solid var(--ending)}
  .ribbon .now:focus{outline:none}
  .ribbon .now:focus::after{box-shadow:0 0 0 3px rgba(168,84,42,.35)}
  .drag-hint{font-family:"Spline Sans Mono",monospace;font-size:9.5px;
             letter-spacing:.06em;color:var(--muted);text-align:center;
             margin-top:8px;opacity:.8}

  /* ---- stage sections ---- */
  .stage{padding:18px 20px 4px}
  .stage h2{font-family:"Spline Sans Mono",monospace;font-size:11.5px;
            letter-spacing:.16em;text-transform:uppercase;margin:0 0 12px;
            display:flex;align-items:center;gap:9px}
  .stage h2 .pip{width:9px;height:9px;border-radius:50%}
  .stage h2 .ct{margin-left:auto;color:var(--muted);font-size:11px;
                letter-spacing:.08em}
  .s-ending .pip{background:var(--ending)} .s-ending h2{color:var(--ending)}
  .s-peak   .pip{background:var(--peak)}   .s-peak h2{color:var(--peak)}
  .s-coming .pip{background:var(--coming)} .s-coming h2{color:var(--coming)}
  .stage .none{font-size:13px;color:var(--muted);font-style:italic;
               padding:2px 2px 10px}

  /* ---- plant card ---- */
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;
        margin-bottom:12px;overflow:hidden}
  .head{display:flex;gap:13px;padding:14px;cursor:pointer;align-items:center}
  .spark{flex:none;width:74px;height:46px}
  .names{flex:1;min-width:0}
  .common{font-family:"Fraunces",serif;font-size:19px;font-weight:600;
          line-height:1.12}
  .sci{font-style:italic;color:var(--muted);font-size:13px;margin-top:1px}
  .badges{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
  .badge{font-family:"Spline Sans Mono",monospace;font-size:9.5px;
         letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;
         border-radius:6px;border:1px solid}
  .b-native{color:var(--native);border-color:#bcd2b0;background:#e7efdc}
  .b-invasive{color:var(--invasive);border-color:#e6b6ac;background:#f6e2dd}
  .b-fam{color:var(--muted);border-color:var(--line);background:#fff}
  .chev{flex:none;color:var(--muted);transition:transform .25s ease}
  .card.open .chev{transform:rotate(90deg)}

  .body{max-height:0;overflow:hidden;transition:max-height .35s ease}
  .card.open .body{max-height:1400px}
  .body-inner{padding:2px 14px 14px;border-top:1px solid var(--line);
              margin-top:0}

  /* ---- photo triptych ---- */
  .photos{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
          padding:13px 0 4px}
  .photo{position:relative;border-radius:11px;overflow:hidden;
         border:1px solid var(--line);background:#e8ebdd;aspect-ratio:1/1}
  .photo img{width:100%;height:100%;object-fit:cover;display:block;
             opacity:0;transition:opacity .4s ease}
  .photo img.loaded{opacity:1}
  .photo .plabel{position:absolute;left:0;right:0;bottom:0;
         font-family:"Spline Sans Mono",monospace;font-size:8.5px;
         letter-spacing:.1em;text-transform:uppercase;color:#fff;
         background:linear-gradient(transparent,rgba(20,30,18,.72));
         padding:14px 7px 5px;text-align:center}
  .photo .ph{position:absolute;inset:0;display:flex;align-items:center;
         justify-content:center;color:#9aa789}
  .photo.shimmer .ph::before{content:"";position:absolute;inset:0;
         background:linear-gradient(90deg,#e8ebdd 0%,#f2f4ea 50%,#e8ebdd 100%);
         background-size:200% 100%;animation:sh 1.2s linear infinite}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .photo-credit{font-family:"Spline Sans Mono",monospace;font-size:8.5px;
         letter-spacing:.05em;color:var(--muted);text-align:right;
         margin:3px 1px 0;opacity:.8}

  .layer{padding:12px 0;border-bottom:1px solid var(--line)}
  .layer:last-child{border-bottom:0}
  .layer .lh{font-family:"Spline Sans Mono",monospace;font-size:10px;
             letter-spacing:.13em;text-transform:uppercase;color:var(--green);
             margin-bottom:5px}
  .layer p{margin:0;font-size:14px;color:#36422f}
  .kin{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
  .kin span{font-size:12px;background:#e7efdc;color:var(--native);
            border-radius:20px;padding:3px 9px}

  /* ---- links / contribute ---- */
  .links{display:flex;flex-direction:column;gap:7px;margin-top:7px}
  .link{display:flex;align-items:center;gap:9px;text-decoration:none;
        color:var(--ink);background:#fff;border:1px solid var(--line);
        border-radius:10px;padding:9px 11px;font-size:13.5px}
  .link .src{font-family:"Spline Sans Mono",monospace;font-size:9px;
             letter-spacing:.07em;text-transform:uppercase;color:#fff;
             padding:3px 6px;border-radius:5px;flex:none}
  .src.yt{background:#c0392b} .src.art{background:#3a6b3f} .src.pdf{background:#6a7560}
  .src.inat{background:#74ac00}
  .link .t{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;
           white-space:nowrap}
  .empty{font-size:13px;color:var(--muted);font-style:italic;margin-top:6px}

  .add{margin-top:10px}
  .add-btn{font-family:"Spline Sans Mono",monospace;font-size:10.5px;
           letter-spacing:.1em;text-transform:uppercase;color:var(--green);
           background:#e7efdc;border:1px dashed #aac199;border-radius:10px;
           padding:9px 12px;width:100%;cursor:pointer}
  .add-form{display:none;gap:8px;margin-top:9px;flex-direction:column}
  .add-form.show{display:flex}
  .add-form input{font-family:"Inter",sans-serif;font-size:13.5px;
           border:1px solid var(--line);border-radius:9px;padding:9px 11px;
           background:#fff;color:var(--ink)}
  .add-form input:focus{outline:2px solid var(--coming);outline-offset:1px}
  .add-row{display:flex;gap:8px}
  .add-row button{flex:1;font-family:"Spline Sans Mono",monospace;font-size:11px;
           letter-spacing:.08em;text-transform:uppercase;border-radius:9px;
           padding:9px;cursor:pointer;border:1px solid}
  .submit{background:var(--green);color:#f3f5ea;border-color:var(--green)}
  .cancel{background:#fff;color:var(--muted);border-color:var(--line)}
  .pending{font-family:"Spline Sans Mono",monospace;font-size:10px;
           letter-spacing:.08em;text-transform:uppercase;color:var(--peak);
           background:#f6ecd2;border:1px solid #e6cf94;border-radius:7px;
           padding:6px 9px;margin-top:8px;display:inline-block}

  footer{text-align:center;padding:22px 20px;color:var(--muted);font-size:12px}
  footer b{color:var(--green);font-weight:600}

  @media (prefers-reduced-motion:reduce){
    *{transition:none!important;animation:none!important}
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="wordmark">Bloom<span>line</span></div>
    <div class="tag">what's blooming on your drive</div>
    <div class="route">
      <span class="dot"></span> <span class="from" id="fromLabel">Sayreville</span>
      <span class="arrow">&rarr;</span>
      <span class="dot"></span> <span class="to" id="toLabel">New Brunswick, NJ</span>
      <button class="edit" id="editBtn" type="button">EDIT</button>
    </div>
    <div class="route-edit" id="routeEdit">
      <label for="fromInput">Start</label>
      <input id="fromInput" type="text" placeholder="Sayreville, NJ" autocomplete="off">
      <label for="toInput">Destination</label>
      <input id="toInput" type="text" placeholder="New Brunswick, NJ" autocomplete="off">
      <div class="re-row">
        <button class="re-go" id="reGo" type="button">Update route</button>
        <button class="re-cancel" id="reCancel" type="button">Cancel</button>
      </div>
      <div class="re-status" id="reStatus"></div>
    </div>
  </header>

  <section class="season">
    <div class="when">
      <span id="whenLabel">Your route &middot; Sun, Jun 15</span>
      <button class="today-btn" id="todayBtn" type="button">&#8634; Today</button>
    </div>
    <div class="ribbon" id="ribbon">
      <div class="months" id="months"></div>
      <div class="now" id="nowmark" tabindex="0" role="slider"
           aria-label="Selected date" aria-valuemin="1" aria-valuemax="365"></div>
    </div>
    <div class="drag-hint">Drag the marker &mdash; or tap the ribbon &mdash; to time-travel the bloom</div>
  </section>

  <main id="stages"></main>

  <footer>
    <span id="footCount">9 plants</span> flowering along this route &middot; data from
    <b>iNaturalist</b> &amp; contributors
  </footer>
</div>

<script>
/* ===================================================================
   Bloomline — interactive prototype
   Fixes in this build:
   1) Draggable timeline: drag the "now" marker (or tap the ribbon) to any
      date; bloom stages, sparklines, counts and the date label recompute
      from each plant's monthly bloom curve.
   2) Editable route: the EDIT control opens Start/Destination inputs and
      refreshes the bloom list live via the iNaturalist API (geocode +
      flowering species + monthly phenology histogram). Falls back to the
      built-in demo data if offline.
   3) Flower / Seed / Leaf photos: each card shows a 3-photo triptych
      pulled from iNaturalist taxon photos, with graceful placeholders.
   =================================================================== */

const DEMO_PLANTS = [
 {common:"Northern Catalpa", sci:"Catalpa speciosa",
  fam:"Bignoniaceae", status:"native",
  curve:[0,0,0,5,80,55,8,0,0,0,0,0],
  why:"Tolerates rough, disturbed ground and city edges. Once planted everywhere for shade and fence posts, it now self-seeds along roads and rivers.",
  uses:"Rot-resistant wood was prized for fence posts and railroad ties. The long dangling seed pods earn it the nickname “cigar tree.”",
  kin:["Trumpet Vine","Empress Tree"],
  kinNote:"The big bell-shaped flowers are kin to the trumpet vine you see swallowing fences.",
  links:[{src:"yt",label:"YouTube",t:"Identifying catalpa in 60 seconds"},
         {src:"art",label:"Article",t:"Catalpa: the native bean tree"}]},

 {common:"Multiflora Rose", sci:"Rosa multiflora",
  fam:"Rosaceae", status:"invasive",
  curve:[0,0,0,10,70,50,5,0,0,0,0,0],
  why:"Brought in as erosion control and a “living fence,” then escaped. It thrives in old fields and roadsides and spreads fast by birds eating the hips.",
  uses:"Still used as hardy rootstock for grafted garden roses. The red hips feed wildlife through winter.",
  kin:["Blackberry","Hawthorn","Apple"],
  kinNote:"Shares the rose family with apples, hawthorns, and the brambles along the same shoulder.",
  links:[{src:"yt",label:"YouTube",t:"Why this rose took over the Northeast"}]},

 {common:"Oxeye Daisy", sci:"Leucanthemum vulgare",
  fam:"Asteraceae", status:"naturalized",
  curve:[0,0,0,5,40,85,70,30,8,0,0,0],
  why:"A meadow and roadside colonizer of poor soils, it arrived with European hay seed and never left.",
  uses:"Young leaves are edible and a touch peppery; long used in folk remedies.",
  kin:["Chicory","Black-eyed Susan"],
  kinNote:"Each “flower” is really a head of many tiny florets, the family trick it shares with chicory.",
  links:[{src:"art",label:"Article",t:"Daisy or chamomile? Telling them apart"}]},

 {common:"Crown Vetch", sci:"Securigera varia",
  fam:"Fabaceae", status:"invasive",
  curve:[0,0,0,0,30,80,75,40,10,0,0,0],
  why:"Mass-planted on highway embankments to hold soil. Those pink mats blanketing a cut slope are almost always this.",
  uses:"Pure erosion control. It is toxic to horses, so it never became a forage crop.",
  kin:["Bird's-foot Trefoil","Mimosa"],
  kinNote:"A legume: like its pea-family cousins it fixes its own nitrogen, which is how it thrives on raw roadcut subsoil.",
  links:[{src:"yt",label:"YouTube",t:"The pink flower on every highway bank"},
         {src:"pdf",label:"Guide",t:"NJ roadside legumes (field key)"}]},

 {common:"Bird's-foot Trefoil", sci:"Lotus corniculatus",
  fam:"Fabaceae", status:"naturalized",
  curve:[0,0,0,0,25,75,80,55,25,5,0,0],
  why:"Sown into roadside seed mixes for cover. The seed pods splay out like a small bird's foot, hence the name.",
  uses:"Grown as livestock forage and a nitrogen-fixing ground cover.",
  kin:["Crown Vetch","Clover"],
  kinNote:"Another pea-family legume, same soil-building trick as crown vetch right beside it.",
  links:[]},

 {common:"Common Milkweed", sci:"Asclepias syriaca",
  fam:"Apocynaceae", status:"native",
  curve:[0,0,0,0,5,35,80,55,15,0,0,0],
  why:"Native to old fields, ditches, and untended margins. It spreads on wind-borne silk from its split pods.",
  uses:"The only host plant for monarch caterpillars. In WWII the floss stuffed life jackets.",
  kin:["Butterfly Weed","Dogbane"],
  kinNote:"The milky sap that beads when you snap a leaf is the family signature.",
  links:[{src:"yt",label:"YouTube",t:"Milkweed & the monarch life cycle"},
         {src:"art",label:"Article",t:"Why milkweed matters"}]},

 {common:"Chicory", sci:"Cichorium intybus",
  fam:"Asteraceae", status:"naturalized",
  curve:[0,0,0,0,0,20,70,85,70,40,10,0],
  why:"A roadside classic of compacted, gravelly verges. The sky-blue flowers open in the morning and close by afternoon.",
  uses:"The roasted root is a coffee substitute and additive; young leaves are a bitter salad green.",
  kin:["Oxeye Daisy","Dandelion"],
  kinNote:"That blue head is built like the daisy's: many florets packed into one.",
  links:[{src:"art",label:"Article",t:"Chicory in your coffee"}]},

 {common:"Mimosa (Silktree)", sci:"Albizia julibrissin",
  fam:"Fabaceae", status:"invasive",
  curve:[0,0,0,0,0,15,75,70,25,0,0,0],
  why:"An ornamental escaped from yards. It favors warm, sunny road edges and disturbed ground.",
  uses:"Planted for the pink powderpuff flowers and fern-like leaves; little use once it goes wild.",
  kin:["Crown Vetch","Redbud"],
  kinNote:"A legume, which is why it turns up so readily on poor roadside soils.",
  links:[]},

 {common:"Tree of Heaven", sci:"Ailanthus altissima",
  fam:"Simaroubaceae", status:"invasive",
  curve:[0,0,0,0,5,25,70,55,15,0,0,0],
  why:"The ultimate disturbance tree: sidewalk cracks, rail lines, road shoulders. It grows almost anywhere, fast.",
  uses:"Few good ones. It is now the favored host of the spotted lanternfly, and crushed leaves smell rank.",
  kin:["Sumac (look-alike)"],
  kinNote:"Often mistaken for sumac or walnut, but the foul smell of a crushed leaf gives it away.",
  links:[]},
];

const STAGES=[
  {key:"ending",cls:"s-ending",title:"Last call",sub:"fading now"},
  {key:"peak",  cls:"s-peak",  title:"At peak",  sub:"full bloom"},
  {key:"coming",cls:"s-coming",title:"Coming up",sub:"watch for these"},
];
const STAGECOLOR={ending:"#a8542a",peak:"#c08a1c",coming:"#5d8a2f"};
const MONTHS=["J","F","M","A","M","J","J","A","S","O","N","D"];
const MONTH_FULL=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

/* ---- app state ---------------------------------------------------- */
let PLANTS = DEMO_PLANTS.map(p=>({...p}));   // live working copy
let selDate = new Date();                    // selected date (drives everything)
const today = new Date();

/* fraction of the year [0,1) for a date (used to place the marker) */
function yearFrac(d){
  const start = new Date(d.getFullYear(),0,1);
  const next  = new Date(d.getFullYear()+1,0,1);
  return (d - start) / (next - start);
}
/* continuous month index [0,12) for a date */
function monthFloat(d){
  return d.getMonth() + (d.getDate()-1) / daysInMonth(d.getFullYear(), d.getMonth());
}
function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
function sameDay(a,b){ return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }

/* interpolate a 12-pt monthly curve at a continuous month index */
function interp(curve, mf){
  mf = ((mf % 12) + 12) % 12;
  const i = Math.floor(mf), f = mf - i;
  const a = curve[i % 12], b = curve[(i+1) % 12];
  return a + (b - a) * f;
}

/* decide a plant's stage on the selected date from its bloom curve */
function stageOf(curve, mf){
  const max = Math.max(...curve, 0);
  if(max <= 0) return "none";
  const now  = interp(curve, mf);
  const prev = interp(curve, mf - 0.7);
  const next = interp(curve, mf + 0.7);
  const rel  = now / max;
  if(rel < 0.12 && next <= now) return "none";        // dormant
  if(rel < 0.20 && next > now)  return "coming";       // about to start
  if(next > prev + max*0.05)    return "coming";       // rising
  if(next < prev - max*0.05)    return "ending";       // declining
  return "peak";                                       // holding near peak
}

/* ---- season ribbon ------------------------------------------------ */
const mw = document.getElementById("months");
MONTHS.forEach((m,i)=>{
  const d = document.createElement("div");
  d.className = "m";
  d.textContent = m;
  d.dataset.month = i;
  mw.appendChild(d);
});
const nowmark = document.getElementById("nowmark");
const ribbon  = document.getElementById("ribbon");

function refreshRibbon(){
  const f = yearFrac(selDate);
  nowmark.style.left = (f*100) + "%";
  // highlight the active month + neighbours
  const mi = selDate.getMonth();
  [...mw.children].forEach((el,i)=>{
    el.classList.toggle("on", Math.abs(i-mi)<=1);
  });
  nowmark.setAttribute("aria-valuenow",
    Math.round(f*365)+1);
  nowmark.setAttribute("aria-valuetext",
    DAYS[selDate.getDay()]+", "+MONTH_FULL[selDate.getMonth()]+" "+selDate.getDate());
}

function refreshWhen(){
  const lbl = "Your route &middot; " + DAYS[selDate.getDay()] + ", "
            + MONTH_FULL[selDate.getMonth()] + " " + selDate.getDate();
  document.getElementById("whenLabel").innerHTML = lbl;
  document.getElementById("todayBtn").classList.toggle("show", !sameDay(selDate, today));
}

/* map a clientX on the ribbon to a date in the current year */
function dateFromX(clientX){
  const r = ribbon.getBoundingClientRect();
  let f = (clientX - r.left) / r.width;
  f = Math.max(0, Math.min(0.99999, f));
  const start = new Date(selDate.getFullYear(),0,1);
  const ms = f * (new Date(selDate.getFullYear()+1,0,1) - start);
  return new Date(start.getTime() + ms);
}

/* throttle re-render to animation frames while dragging */
let rafPending = false;
function setDate(d, full){
  selDate = d;
  refreshRibbon();
  refreshWhen();
  if(full){ renderStages(); }
  else if(!rafPending){
    rafPending = true;
    requestAnimationFrame(()=>{ rafPending=false; renderStages(); });
  }
}

/* ---- drag / tap interactions on the ribbon ----------------------- */
let dragging = false;
function startDrag(e){
  dragging = true;
  nowmark.setPointerCapture && e.pointerId!=null && nowmark.setPointerCapture(e.pointerId);
  moveDrag(e);
  e.preventDefault();
}
function moveDrag(e){
  if(!dragging) return;
  const x = (e.touches ? e.touches[0].clientX : e.clientX);
  setDate(dateFromX(x), false);
}
function endDrag(){ if(dragging){ dragging=false; renderStages(); } }

nowmark.addEventListener("pointerdown", startDrag);
window.addEventListener("pointermove", moveDrag);
window.addEventListener("pointerup", endDrag);
/* tap anywhere on the ribbon to jump there */
ribbon.addEventListener("pointerdown", e=>{
  if(e.target === nowmark) return;
  setDate(dateFromX(e.clientX), true);
});
/* keyboard: arrows = +/- a day, shift = a week */
nowmark.addEventListener("keydown", e=>{
  let step = 0;
  if(e.key==="ArrowLeft")  step = -1;
  if(e.key==="ArrowRight") step =  1;
  if(!step) return;
  if(e.shiftKey) step *= 7;
  const d = new Date(selDate); d.setDate(d.getDate()+step);
  setDate(d, true);
  e.preventDefault();
});
document.getElementById("todayBtn").addEventListener("click", ()=> setDate(new Date(), true));

/* ---- sparkline ---------------------------------------------------- */
function spark(curve, color, mf){
  const W=74,H=46,pad=3,n=curve.length,max=Math.max(...curve,1);
  const x=i=>pad+(i/(n-1))*(W-2*pad);
  const y=v=>H-pad-(v/max)*(H-2*pad);
  let d="M"+x(0)+" "+y(curve[0]);
  for(let i=1;i<n;i++) d+=" L"+x(i)+" "+y(curve[i]);
  const area=d+" L"+x(n-1)+" "+(H-pad)+" L"+x(0)+" "+(H-pad)+" Z";
  const nx=pad+(((mf%12)+12)%12)/(n-1)*(W-2*pad);
  const ny=y(interp(curve,mf));
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" aria-hidden="true">
    <path d="${area}" fill="${color}" opacity=".14"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="1.6"
          stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="${nx}" y1="2" x2="${nx}" y2="${H-2}" stroke="${color}"
          stroke-width="1" stroke-dasharray="2 2" opacity=".7"/>
    <circle cx="${nx}" cy="${ny}" r="2.4" fill="${color}"/>
  </svg>`;
}

function badge(status,fam){
  const cls = status==="invasive" ? "b-invasive" : "b-native";
  const famBadge = fam ? `<span class="badge b-fam">${esc(fam)}</span>` : "";
  return `<span class="badge ${cls}">${esc(status)}</span>${famBadge}`;
}

function linksHTML(arr){
  if(!arr || !arr.length) return `<div class="empty">No links yet. Be the first to add one.</div>`;
  return `<div class="links">`+arr.map(l=>
    `<a class="link" href="${l.url?esc(l.url):'#'}" ${l.url?'target="_blank" rel="noopener"':'onclick="return false"'}>
       <span class="src ${l.src||'art'}">${esc(l.label||'Link')}</span>
       <span class="t">${esc(l.t||'')}</span></a>`).join("")+`</div>`;
}

/* flower / seed / leaf triptych — photos lazy-load from iNaturalist */
const PARTS = ["Flower","Leaf","Seed"];
function photosHTML(){
  return `<div class="photos">` + PARTS.map(part=>
    `<div class="photo shimmer" data-part="${part}">
       <div class="ph">&#127807;</div>
       <span class="plabel">${part}</span>
     </div>`).join("") + `</div>
     <div class="photo-credit">photos: iNaturalist (CC)</div>`;
}

function esc(s){ return String(s==null?"":s)
  .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
  .replace(/"/g,"&quot;"); }

function card(p, idx, mf){
  const stg = stageOf(p.curve, mf);
  const c = STAGECOLOR[stg] || "#6a7560";
  return `<div class="card" id="card${idx}">
    <div class="head" onclick="toggle(${idx})" role="button" aria-expanded="false">
      ${spark(p.curve, c, mf)}
      <div class="names">
        <div class="common">${esc(p.common)}</div>
        <div class="sci">${esc(p.sci)}</div>
        <div class="badges">${badge(p.status, p.fam)}</div>
      </div>
      <div class="chev">&rsaquo;</div>
    </div>
    <div class="body"><div class="body-inner">
      ${photosHTML()}
      <div class="layer"><div class="lh">Why it grows here</div><p>${esc(p.why)||'<span style="color:var(--muted)">No notes yet for this species.</span>'}</p></div>
      ${p.uses?`<div class="layer"><div class="lh">Uses</div><p>${esc(p.uses)}</p></div>`:""}
      ${p.kinNote?`<div class="layer"><div class="lh">Related plants</div>
        <p>${esc(p.kinNote)}</p>
        <div class="kin">${(p.kin||[]).map(k=>`<span>${esc(k)}</span>`).join("")}</div></div>`:""}
      <div class="layer"><div class="lh">Learn more</div>
        ${linksHTML(p.links)}
        <div class="add">
          <button class="add-btn" onclick="showAdd(${idx})">+ Add a link</button>
          <div class="add-form" id="form${idx}">
            <input placeholder="Paste a YouTube or article link">
            <input placeholder="Short title">
            <div class="add-row">
              <button class="submit" onclick="submitAdd(${idx})">Submit</button>
              <button class="cancel" onclick="showAdd(${idx})">Cancel</button>
            </div>
          </div>
          <div id="pend${idx}"></div>
        </div>
      </div>
    </div></div>
  </div>`;
}

/* ---- render the three stage sections for the selected date -------- */
const host = document.getElementById("stages");
// map a card index -> plant, so we can lazy-load photos on open
let CARD_PLANT = {};

function renderStages(){
  const mf = monthFloat(selDate);
  // remember which cards were open so a re-render doesn't collapse them
  const openIds = new Set([...document.querySelectorAll(".card.open")].map(c=>c.id));
  CARD_PLANT = {};
  let idx = 0, flowering = 0;
  let html = "";
  STAGES.forEach(s=>{
    const items = PLANTS.filter(p=>stageOf(p.curve, mf)===s.key);
    html += `<section class="stage ${s.cls}">
      <h2><span class="pip"></span>${s.title}
          <span class="ct">${items.length} &middot; ${s.sub}</span></h2>`;
    if(items.length){
      items.forEach(p=>{ CARD_PLANT[idx]=p; html += card(p, idx, mf); idx++; flowering++; });
    } else {
      html += `<div class="none">Nothing in this stage on ${MONTH_FULL[selDate.getMonth()]} ${selDate.getDate()}.</div>`;
    }
    html += `</section>`;
  });
  host.innerHTML = html;
  // restore open cards + (re)load their photos
  openIds.forEach(id=>{
    const el = document.getElementById(id);
    if(el){ el.classList.add("open");
      const h=el.querySelector(".head"); if(h) h.setAttribute("aria-expanded","true");
      loadPhotos(el, CARD_PLANT[+id.replace("card","")]);
    }
  });
  document.getElementById("footCount").textContent =
    flowering + (flowering===1?" plant":" plants");
}

/* ---- interactions ------------------------------------------------- */
function toggle(i){
  const el = document.getElementById("card"+i);
  const open = el.classList.toggle("open");
  el.querySelector(".head").setAttribute("aria-expanded", open);
  if(open) loadPhotos(el, CARD_PLANT[i]);
}
function showAdd(i){ document.getElementById("form"+i).classList.toggle("show"); }
function submitAdd(i){
  const f = document.getElementById("form"+i);
  f.classList.remove("show");
  f.querySelectorAll("input").forEach(x=>x.value="");
  document.getElementById("pend"+i).innerHTML =
    `<span class="pending">&#10003; Submitted &middot; pending review</span>`;
}
window.toggle=toggle; window.showAdd=showAdd; window.submitAdd=submitAdd;

/* ===================================================================
   iNaturalist API integration
   =================================================================== */
const INAT = "https://api.inaturalist.org/v1";

/* photo cache so we never re-fetch the same taxon */
const photoCache = {};

async function loadPhotos(cardEl, plant){
  if(!plant) return;
  const tiles = cardEl.querySelectorAll(".photo");
  if(!tiles.length || cardEl.dataset.photos==="done" || cardEl.dataset.photos==="loading") return;
  cardEl.dataset.photos = "loading";
  try{
    let photos = photoCache[plant.sci];
    if(!photos){
      photos = await fetchTaxonPhotos(plant.sci);
      photoCache[plant.sci] = photos;
    }
    tiles.forEach((tile,i)=>{
      const url = photos[i] || photos[0];   // reuse first if fewer than 3
      if(url){
        const img = new Image();
        img.alt = plant.common + " — " + tile.dataset.part;
        img.onload = ()=>{ tile.classList.remove("shimmer");
          const ph=tile.querySelector(".ph"); if(ph) ph.remove();
          tile.insertBefore(img, tile.firstChild);
          requestAnimationFrame(()=>img.classList.add("loaded")); };
        img.onerror = ()=>{ tile.classList.remove("shimmer"); };
        img.src = url;
      } else {
        tile.classList.remove("shimmer");
      }
    });
    cardEl.dataset.photos = "done";
  }catch(err){
    tiles.forEach(t=>t.classList.remove("shimmer"));
    cardEl.dataset.photos = "";   // allow a retry next open
  }
}

/* up to 3 representative photos for a scientific name */
async function fetchTaxonPhotos(sci){
  const r = await fetch(`${INAT}/taxa?q=${encodeURIComponent(sci)}&per_page=1&order=desc&order_by=observations_count`);
  if(!r.ok) throw new Error("taxa "+r.status);
  const j = await r.json();
  const t = (j.results||[])[0];
  if(!t) return [];
  let urls = [];
  if(Array.isArray(t.taxon_photos)){
    urls = t.taxon_photos.map(tp=>tp.photo && (tp.photo.medium_url||tp.photo.url))
                         .filter(Boolean);
  }
  if(!urls.length && t.default_photo){
    urls = [t.default_photo.medium_url || t.default_photo.url].filter(Boolean);
  }
  return urls.slice(0,3);
}

/* geocode a place name -> {name, lat, lng} via iNat places autocomplete */
async function geocode(name){
  const r = await fetch(`${INAT}/places/autocomplete?q=${encodeURIComponent(name)}&per_page=1`);
  if(!r.ok) throw new Error("geocode "+r.status);
  const j = await r.json();
  const p = (j.results||[])[0];
  if(!p || !p.location) throw new Error("no match for “"+name+"”");
  const [lat,lng] = p.location.split(",").map(Number);
  return {name:p.display_name||name, lat, lng};
}

/* flowering species near a point in the last 30 days */
async function floweringNear(lat,lng){
  const d2 = new Date(), d1 = new Date(); d1.setDate(d1.getDate()-30);
  const iso = d=>d.toISOString().slice(0,10);
  const u = `${INAT}/observations/species_counts?lat=${lat}&lng=${lng}&radius=15`
          + `&iconic_taxa=Plantae&term_id=12&term_value_id=13`
          + `&quality_grade=research&d1=${iso(d1)}&d2=${iso(d2)}&per_page=30`;
  const r = await fetch(u);
  if(!r.ok) throw new Error("species "+r.status);
  return (await r.json()).results||[];
}

/* monthly flowering histogram -> 12-pt curve */
async function monthlyCurve(taxonId){
  try{
    const u = `${INAT}/observations/histogram?taxon_id=${taxonId}`
            + `&date_field=observed&interval=month_of_year`
            + `&term_id=12&term_value_id=13`;
    const r = await fetch(u);
    if(!r.ok) return null;
    const h = (await r.json()).results.month_of_year;
    const curve = [];
    for(let m=1;m<=12;m++) curve.push(h[m]||h[String(m)]||0);
    const max = Math.max(...curve,1);
    return curve.map(v=>Math.round(v/max*100));   // normalise 0..100
  }catch(e){ return null; }
}

/* turn iNat taxon establishment info into our status string */
function statusOf(taxon){
  const em = taxon.establishment_means && (taxon.establishment_means.establishment_means||taxon.establishment_means);
  if(em==="introduced") return "invasive";
  if(em==="native" || em==="endemic") return "native";
  return "naturalized";
}

/* ---- route editor ------------------------------------------------- */
const editBtn   = document.getElementById("editBtn");
const routeEdit = document.getElementById("routeEdit");
const reStatus  = document.getElementById("reStatus");
const fromInput = document.getElementById("fromInput");
const toInput   = document.getElementById("toInput");

function openEditor(){
  routeEdit.classList.add("show");
  fromInput.value = document.getElementById("fromLabel").textContent.trim();
  toInput.value   = document.getElementById("toLabel").textContent.trim();
  reStatus.textContent = ""; reStatus.classList.remove("err");
  fromInput.focus();
}
function closeEditor(){ routeEdit.classList.remove("show"); }
editBtn.addEventListener("click", ()=> routeEdit.classList.contains("show")?closeEditor():openEditor());
document.getElementById("reCancel").addEventListener("click", closeEditor);

document.getElementById("reGo").addEventListener("click", updateRoute);
toInput.addEventListener("keydown", e=>{ if(e.key==="Enter") updateRoute(); });
fromInput.addEventListener("keydown", e=>{ if(e.key==="Enter") toInput.focus(); });

async function updateRoute(){
  const from = fromInput.value.trim(), to = toInput.value.trim();
  if(!from || !to){ setStatus("Enter both a start and a destination.", true); return; }
  setStatus("Locating “"+from+"” and “"+to+"”…");
  try{
    const [A,B] = await Promise.all([geocode(from), geocode(to)]);
    setStatus("Asking iNaturalist what's flowering along the route…");
    // sample both endpoints + the midpoint
    const mid = {lat:(A.lat+B.lat)/2, lng:(A.lng+B.lng)/2};
    const lists = await Promise.all([
      floweringNear(A.lat,A.lng),
      floweringNear(mid.lat,mid.lng),
      floweringNear(B.lat,B.lng),
    ]);
    // aggregate by taxon
    const agg = {};
    lists.forEach(list=> list.forEach(row=>{
      const t = row.taxon; if(!t) return;
      const a = agg[t.id] || (agg[t.id]={taxon:t, count:0, pts:0});
      a.count += row.count; a.pts += 1;
    }));
    let ranked = Object.values(agg)
      .sort((x,y)=> (y.pts-x.pts) || (y.count-x.count))
      .slice(0,12);
    if(!ranked.length){ setStatus("No flowering observations found along that route right now.", true); return; }
    setStatus("Building bloom curves for "+ranked.length+" species…");
    // fetch a real monthly curve per species (fall back to a generic bell)
    const built = await Promise.all(ranked.map(async a=>{
      const t = a.taxon;
      const curve = (await monthlyCurve(t.id)) || genericCurve();
      return {
        common: (t.preferred_common_name || t.name || "Unknown").replace(/\b\w/g,m=>m.toUpperCase()),
        sci: t.name || "",
        fam: "", status: statusOf(t),
        curve,
        why:"", uses:"", kin:[], kinNote:"",
        links: t.id ? [{src:"inat",label:"iNat",t:"View on iNaturalist", url:"https://www.inaturalist.org/taxa/"+t.id}] : [],
        _photo: t.default_photo ? (t.default_photo.medium_url||t.default_photo.url) : null,
      };
    }));
    // seed the photo cache with each taxon's default photo so the first
    // triptych tile shows instantly even before the detail fetch
    built.forEach(p=>{ if(p._photo && !photoCache[p.sci]) photoCache[p.sci]=[p._photo]; });

    PLANTS = built;
    document.getElementById("fromLabel").textContent = shortName(from);
    document.getElementById("toLabel").textContent   = shortName(to);
    renderStages();
    setStatus("✓ Updated — "+built.length+" species along "+shortName(from)+" → "+shortName(to));
    setTimeout(closeEditor, 1200);
  }catch(err){
    setStatus("Couldn't update: "+err.message+". Showing the previous route.", true);
  }
}
function setStatus(msg, isErr){
  reStatus.textContent = msg;
  reStatus.classList.toggle("err", !!isErr);
}
function shortName(s){ return s.split(",")[0].trim(); }
function genericCurve(){ return [0,0,2,10,40,75,85,70,40,12,2,0]; }

/* ---- boot --------------------------------------------------------- */
refreshRibbon();
refreshWhen();
renderStages();
</script>
