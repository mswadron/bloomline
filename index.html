<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bloomline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1c2a1d; --green:#2f5233; --paper:#eef0e6; --card:#f7f8f1;
    --line:#d3d8c4; --muted:#6a7560;
    --coming:#5d8a2f; --peak:#c08a1c; --ending:#a8542a;
    --invasive:#b23b2a; --native:#3a6b3f;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);
    font-family:"Inter",system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.5}
  .app{max-width:480px;margin:0 auto;padding:0 0 64px;min-height:100vh;background:var(--paper)}

  header{padding:26px 20px 18px;background:var(--green);color:#f3f5ea;
         border-bottom-left-radius:22px;border-bottom-right-radius:22px}
  .wordmark{font-family:"Fraunces",serif;font-weight:600;font-size:30px;letter-spacing:.2px;line-height:1}
  .wordmark span{font-style:italic;font-weight:400;opacity:.85}
  .tag{font-family:"Spline Sans Mono",monospace;font-size:11px;letter-spacing:.14em;
       text-transform:uppercase;opacity:.72;margin-top:6px}
  .route{display:flex;align-items:center;gap:8px;margin-top:18px;background:rgba(255,255,255,.1);
         border:1px solid rgba(255,255,255,.18);padding:11px 13px;border-radius:13px;font-size:14.5px}
  .route .dot{width:8px;height:8px;border-radius:50%;background:#cfe0a8;flex:none}
  .route .arrow{opacity:.5;margin:0 2px}
  .route .from,.route .to{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40%}
  .route .edit{margin-left:auto;font-family:"Spline Sans Mono",monospace;font-size:10.5px;
               letter-spacing:.1em;opacity:.85;cursor:pointer;border:1px solid rgba(255,255,255,.25);
               border-radius:7px;padding:4px 7px;flex:none;background:none;color:inherit}
  .route .edit:hover{background:rgba(255,255,255,.14)}

  .route-edit{display:none;margin-top:12px;background:rgba(255,255,255,.08);
              border:1px solid rgba(255,255,255,.2);border-radius:13px;padding:13px}
  .route-edit.show{display:block}
  .route-edit label{display:block;font-family:"Spline Sans Mono",monospace;font-size:9.5px;
              letter-spacing:.12em;text-transform:uppercase;opacity:.75;margin:0 0 4px}
  .route-edit input{width:100%;font-family:"Inter",sans-serif;font-size:14px;
              border:1px solid rgba(255,255,255,.25);border-radius:9px;padding:9px 11px;
              background:rgba(255,255,255,.95);color:var(--ink);margin-bottom:10px}
  .route-edit .re-row{display:flex;gap:8px;margin-top:2px}
  .route-edit .re-row button{flex:1;font-family:"Spline Sans Mono",monospace;font-size:11px;
              letter-spacing:.08em;text-transform:uppercase;border-radius:9px;padding:9px;cursor:pointer;border:1px solid}
  .re-go{background:#f3f5ea;color:var(--green);border-color:#f3f5ea}
  .re-cancel{background:transparent;color:#f3f5ea;border-color:rgba(255,255,255,.35)}
  .re-status{font-family:"Spline Sans Mono",monospace;font-size:10.5px;letter-spacing:.04em;
             margin-top:9px;min-height:14px;opacity:.92}
  .re-status.err{color:#ffd9cf}

  .season{padding:16px 20px 4px}
  .season .when{font-family:"Spline Sans Mono",monospace;font-size:11px;letter-spacing:.12em;
                text-transform:uppercase;color:var(--muted);display:flex;justify-content:space-between;
                align-items:center;margin-bottom:7px}
  .season .when .today-btn{font-family:"Spline Sans Mono",monospace;font-size:10px;letter-spacing:.1em;
                text-transform:uppercase;color:var(--green);background:#dfe7cb;border:1px solid #c2d0a6;
                border-radius:6px;padding:3px 8px;cursor:pointer;display:none}
  .season .when .today-btn.show{display:inline-block}
  .ribbon{position:relative;height:30px;touch-action:none;cursor:pointer}
  .ribbon .months{display:flex;height:26px;border-radius:7px;overflow:hidden;border:1px solid var(--line)}
  .ribbon .m{flex:1;font-family:"Spline Sans Mono",monospace;font-size:9px;color:var(--muted);
             display:flex;align-items:center;justify-content:center;background:var(--card);
             border-right:1px solid var(--line)}
  .ribbon .m:last-child{border-right:0}
  .ribbon .m.on{background:#dfe7cb;color:var(--green);font-weight:500}
  .ribbon .now{position:absolute;top:-3px;height:32px;width:2px;background:var(--ending);
               border-radius:2px;transform:translateX(-1px);touch-action:none;cursor:grab}
  .ribbon .now:active{cursor:grabbing}
  .ribbon .now::after{content:"";position:absolute;top:-5px;left:50%;transform:translateX(-50%);
               width:14px;height:14px;border-radius:50%;background:var(--ending);
               box-shadow:0 1px 4px rgba(0,0,0,.25);border:2px solid #f3f5ea}
  .ribbon .now::before{content:"";position:absolute;top:-13px;left:50%;transform:translateX(-50%);
               border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--ending)}
  .ribbon .now:focus{outline:none}
  .ribbon .now:focus::after{box-shadow:0 0 0 3px rgba(168,84,42,.35)}
  .drag-hint{font-family:"Spline Sans Mono",monospace;font-size:9.5px;letter-spacing:.06em;
             color:var(--muted);text-align:center;margin-top:8px;opacity:.8}

  /* ---- big section (In bloom / Coming up) ---- */
  .sec{padding:18px 20px 0}
  .sec > h2{font-family:"Fraunces",serif;font-weight:600;font-size:21px;margin:0 0 2px;
            display:flex;align-items:baseline;gap:9px}
  .sec > h2 .cnt{font-family:"Spline Sans Mono",monospace;font-size:11px;letter-spacing:.08em;
            color:var(--muted);font-weight:400;margin-left:auto}
  .sec.coming > h2{color:var(--green)}
  .sec-sub{font-size:12.5px;color:var(--muted);margin:0 0 8px}

  /* ---- type group (Trees / Shrubs / Ground) ---- */
  .grp{margin-top:12px}
  .grp h3{font-family:"Spline Sans Mono",monospace;font-size:10.5px;letter-spacing:.15em;
          text-transform:uppercase;color:var(--green);margin:0 0 9px;display:flex;align-items:center;gap:8px}
  .grp h3 .gi{width:18px;height:18px;flex:none;color:var(--green)}
  .grp h3 .gc{margin-left:auto;color:var(--muted);font-size:10px;letter-spacing:.08em}
  .grp .empty-grp{font-size:12.5px;color:var(--muted);font-style:italic;padding:0 0 4px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;margin-bottom:12px;overflow:hidden}
  .head{display:flex;gap:13px;padding:14px;cursor:pointer;align-items:center}
  .spark{flex:none;width:64px;height:42px}
  .names{flex:1;min-width:0}
  .common{font-family:"Fraunces",serif;font-size:18px;font-weight:600;line-height:1.12}
  .sci{font-style:italic;color:var(--muted);font-size:12.5px;margin-top:1px}
  .badges{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap;align-items:center}
  .badge{font-family:"Spline Sans Mono",monospace;font-size:9.5px;letter-spacing:.08em;
         text-transform:uppercase;padding:3px 7px;border-radius:6px;border:1px solid}
  .b-native{color:var(--native);border-color:#bcd2b0;background:#e7efdc}
  .b-invasive{color:var(--invasive);border-color:#e6b6ac;background:#f6e2dd}
  .b-fam{color:var(--muted);border-color:var(--line);background:#fff}
  /* stage chip = attribute, not a section */
  .chip{font-family:"Spline Sans Mono",monospace;font-size:9.5px;letter-spacing:.07em;
        text-transform:uppercase;padding:3px 8px 3px 6px;border-radius:20px;display:inline-flex;
        align-items:center;gap:5px;border:1px solid}
  .chip .pip{width:7px;height:7px;border-radius:50%}
  .chip.opening{color:var(--coming);border-color:#bcd6a3;background:#e9f1da}
  .chip.opening .pip{background:var(--coming)}
  .chip.peak{color:var(--peak);border-color:#e6cf94;background:#f7eccf}
  .chip.peak .pip{background:var(--peak)}
  .chip.fading{color:var(--ending);border-color:#e6b6ac;background:#f6e2dd}
  .chip.fading .pip{background:var(--ending)}
  .chip.coming{color:var(--green);border-color:#c2d0a6;background:#e3ebd4}
  .chip.coming .pip{background:var(--coming)}
  .chev{flex:none;color:var(--muted);transition:transform .25s ease}
  .card.open .chev{transform:rotate(90deg)}

  .body{max-height:0;overflow:hidden;transition:max-height .35s ease}
  .card.open .body{max-height:1500px}
  .body-inner{padding:2px 14px 14px;border-top:1px solid var(--line)}

  .photos{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:13px 0 4px}
  .photo{position:relative;border-radius:11px;overflow:hidden;border:1px solid var(--line);
         background:#e8ebdd;aspect-ratio:1/1}
  .photo img{width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .4s ease}
  .photo img.loaded{opacity:1}
  .photo .plabel{position:absolute;left:0;right:0;bottom:0;font-family:"Spline Sans Mono",monospace;
         font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:#fff;
         background:linear-gradient(transparent,rgba(20,30,18,.72));padding:14px 7px 5px;text-align:center}
  .photo .ph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#9aa789}
  .photo.shimmer .ph::before{content:"";position:absolute;inset:0;
         background:linear-gradient(90deg,#e8ebdd 0%,#f2f4ea 50%,#e8ebdd 100%);
         background-size:200% 100%;animation:sh 1.2s linear infinite}
  @keyframes sh{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .photo-credit{font-family:"Spline Sans Mono",monospace;font-size:8.5px;letter-spacing:.05em;
         color:var(--muted);text-align:right;margin:3px 1px 0;opacity:.8}

  .layer{padding:12px 0;border-bottom:1px solid var(--line)}
  .layer:last-child{border-bottom:0}
  .layer .lh{font-family:"Spline Sans Mono",monospace;font-size:10px;letter-spacing:.13em;
             text-transform:uppercase;color:var(--green);margin-bottom:5px}
  .layer p{margin:0;font-size:14px;color:#36422f}
  .kin{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
  .kin span{font-size:12px;background:#e7efdc;color:var(--native);border-radius:20px;padding:3px 9px}

  .links{display:flex;flex-direction:column;gap:7px;margin-top:7px}
  .link{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--ink);background:#fff;
        border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:13.5px}
  .link .src{font-family:"Spline Sans Mono",monospace;font-size:9px;letter-spacing:.07em;
             text-transform:uppercase;color:#fff;padding:3px 6px;border-radius:5px;flex:none}
  .src.yt{background:#c0392b} .src.art{background:#3a6b3f} .src.pdf{background:#6a7560} .src.inat{background:#74ac00}
  .link .t{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .empty{font-size:13px;color:var(--muted);font-style:italic;margin-top:6px}

  .add{margin-top:10px}
  .add-btn{font-family:"Spline Sans Mono",monospace;font-size:10.5px;letter-spacing:.1em;
           text-transform:uppercase;color:var(--green);background:#e7efdc;border:1px dashed #aac199;
           border-radius:10px;padding:9px 12px;width:100%;cursor:pointer}
  .add-form{display:none;gap:8px;margin-top:9px;flex-direction:column}
  .add-form.show{display:flex}
  .add-form input{font-family:"Inter",sans-serif;font-size:13.5px;border:1px solid var(--line);
           border-radius:9px;padding:9px 11px;background:#fff;color:var(--ink)}
  .add-form input:focus{outline:2px solid var(--coming);outline-offset:1px}
  .add-row{display:flex;gap:8px}
  .add-row button{flex:1;font-family:"Spline Sans Mono",monospace;font-size:11px;letter-spacing:.08em;
           text-transform:uppercase;border-radius:9px;padding:9px;cursor:pointer;border:1px solid}
  .submit{background:var(--green);color:#f3f5ea;border-color:var(--green)}
  .cancel{background:#fff;color:var(--muted);border-color:var(--line)}
  .pending{font-family:"Spline Sans Mono",monospace;font-size:10px;letter-spacing:.08em;
           text-transform:uppercase;color:var(--peak);background:#f6ecd2;border:1px solid #e6cf94;
           border-radius:7px;padding:6px 9px;margin-top:8px;display:inline-block}

  footer{text-align:center;padding:22px 20px;color:var(--muted);font-size:12px}
  footer b{color:var(--green);font-weight:600}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  .photo.clickable{cursor:zoom-in}
  #lightbox{position:fixed;inset:0;background:rgba(18,26,16,.93);display:none;align-items:center;
    justify-content:center;flex-direction:column;gap:12px;z-index:200;padding:24px}
  #lightbox.show{display:flex}
  #lightbox img{max-width:100%;max-height:78vh;border-radius:12px;object-fit:contain;
    touch-action:none;transform-origin:center center;will-change:transform;cursor:grab;
    box-shadow:0 12px 48px rgba(0,0,0,.55);background:#0d130c}
  #lightbox .lb-cap{color:#f3f5ea;font-family:"Spline Sans Mono",monospace;font-size:11px;
    letter-spacing:.07em;text-transform:uppercase;text-align:center;max-width:92%}
  #lightbox .lb-cap .cr{display:block;opacity:.65;margin-top:4px;font-size:10px;
    letter-spacing:.03em;text-transform:none}
  #lightbox .lb-close{position:absolute;top:14px;right:18px;color:#f3f5ea;font-size:30px;
    background:none;border:0;cursor:pointer;line-height:1;opacity:.85}
  #lightbox .lb-hint{color:#f3f5ea;opacity:.5;font-size:10px;font-family:"Spline Sans Mono",monospace;
    letter-spacing:.1em;text-transform:uppercase}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="wordmark">Bloom<span>line</span></div>
    <div class="tag">what's blooming on your drive</div>
    <div class="route">
      <span class="dot"></span> <span class="from" id="fromLabel">Sayreville</span>
      <span class="arrow">&rarr;</span>
      <span class="dot"></span> <span class="to" id="toLabel">New Brunswick, NJ</span>
      <button class="edit" id="editBtn" type="button">EDIT</button>
    </div>
    <div class="route-edit" id="routeEdit">
      <label for="fromInput">Start</label>
      <input id="fromInput" type="text" placeholder="Sayreville, NJ" autocomplete="off">
      <label for="toInput">Destination</label>
      <input id="toInput" type="text" placeholder="New Brunswick, NJ" autocomplete="off">
      <div class="re-row">
        <button class="re-go" id="reGo" type="button">Update route</button>
        <button class="re-cancel" id="reCancel" type="button">Cancel</button>
      </div>
      <div class="re-status" id="reStatus"></div>
    </div>
  </header>

  <section class="season">
    <div class="when">
      <span id="whenLabel">Your route &middot; Jun 16</span>
      <button class="today-btn" id="todayBtn" type="button">&#8634; Today</button>
    </div>
    <div class="ribbon" id="ribbon">
      <div class="months" id="months"></div>
      <div class="now" id="nowmark" tabindex="0" role="slider"
           aria-label="Selected date" aria-valuemin="1" aria-valuemax="365"></div>
    </div>
    <div class="drag-hint">Drag the marker &mdash; or tap the ribbon &mdash; to time-travel the season</div>
  </section>

  <main id="stages"></main>

  <footer>
    <span id="footCount">plants</span> flowering along this route &middot; data from
    <b>iNaturalist</b> &amp; contributors
  </footer>
</div>

<script>
/* ===================================================================
   Bloomline — interactive prototype
   This build adds, per request:
   A) A full-season plant list (skunk cabbage in Feb through fall asters),
      not just the original handful.
   B) A growth-form dimension — Trees / Shrubs / Ground & wildflowers —
      used to GROUP the list. Bloom stage (just opening / at peak / fading)
      is now an ATTRIBUTE chip on each card, not a separate section. The two
      top-level sections are simply "In bloom now" and "Coming up".
   C) Three DISTINCT photos per plant (flower / leaf / seed) — deduped from
      iNaturalist taxon + observation photos, never the same image repeated.
   D) A working geocoder for the Start/Destination fields (Open-Meteo, CORS-
      friendly) so the route actually resolves the locations you type.
   =================================================================== */

/* ---- full-season dataset (central NJ) ----------------------------
   type: tree | shrub | ground
   status: native | invasive | naturalized
   curve: 12 monthly flowering-intensity values, Jan..Dec (0-100)         */
const DEMO_PLANTS = [
 // ---- TREES ----
 {common:"Silver Maple", sci:"Acer saccharinum", type:"tree", fam:"Sapindaceae", status:"native",
  bloom:{s:[2,20],p:[3,5],e:[3,25]},
  why:"A fast riverbank and floodplain tree that flowers before its leaves, dusting bare twigs red before anything else greens up.",
  uses:"Cheap, fast shade once planted everywhere; brittle wood drops limbs in storms.",
  kin:["Red Maple","Boxelder"], kinNote:"A maple — the paired winged ‘helicopter’ seeds give it away."},
 {common:"Red Maple", sci:"Acer rubrum", type:"tree", fam:"Sapindaceae", status:"native",
  bloom:{s:[3,10],p:[3,26],e:[4,15]},
  why:"The most common tree in the eastern US, at home from swamp to roadcut. Tiny red flowers haze the canopy in late March.",
  uses:"Reliable shade and the first hit of red in fall. Sap can be tapped, though it runs weaker than sugar maple.",
  kin:["Silver Maple","Sugar Maple"], kinNote:"Maple kin — winged seed pairs and opposite buds."},
 {common:"Saucer Magnolia", sci:"Magnolia x soulangeana", type:"tree", fam:"Magnoliaceae", status:"naturalized",
  bloom:{s:[3,25],p:[4,6],e:[4,20]},
  why:"A dooryard ornamental whose big pink goblets open on bare branches — and often get nipped by a late frost.",
  uses:"Showy spring display, nothing more. The flowers brown fast in a cold snap.",
  kin:["Star Magnolia","Tulip Tree"], kinNote:"An ancient lineage pollinated by beetles before bees existed."},
 {common:"Callery (Ornamental) Pear", sci:"Pyrus calleryana", type:"tree", fam:"Rosaceae", status:"invasive",
  bloom:{s:[4,1],p:[4,12],e:[4,26]},
  why:"Planted by the million as ‘Bradford’ pear, now escaping into every fallow field and roadside as dense thorny thickets.",
  uses:"Once prized for tidy shape and white spring bloom; the flowers smell foul and limbs split with age. Banned in several states.",
  kin:["Multiflora Rose","Crabapple"], kinNote:"A rose-family tree — five-petaled white flowers like apple and hawthorn."},
 {common:"Ornamental Cherry", sci:"Prunus x yedoensis", type:"tree", fam:"Rosaceae", status:"naturalized",
  bloom:{s:[4,4],p:[4,14],e:[4,27]},
  why:"The Yoshino cherry of avenue plantings and parks — a brief, spectacular pink-white cloud in early April.",
  uses:"Celebrated purely for the bloom; small bitter fruits feed birds.",
  kin:["Crabapple","Black Cherry"], kinNote:"A rose-family stone fruit — note the horizontal lenticels banding the bark."},
 {common:"Eastern Redbud", sci:"Cercis canadensis", type:"tree", fam:"Fabaceae", status:"native",
  bloom:{s:[4,12],p:[4,24],e:[5,8]},
  why:"A native understory tree that flowers magenta straight from its bare trunk and limbs at woodland edges.",
  uses:"The pea-like flowers are edible and tangy in salads; a favorite of early bees.",
  kin:["Black Locust","Crown Vetch"], kinNote:"A legume — those flowers are tiny sweet-pea blossoms; pods follow."},
 {common:"Crabapple", sci:"Malus spp.", type:"tree", fam:"Rosaceae", status:"naturalized",
  bloom:{s:[4,18],p:[5,2],e:[5,16]},
  why:"Street and yard ornamentals that froth pink-to-white in late April and hold tiny apples into winter.",
  uses:"Fruit makes a sharp jelly and feeds birds; key pollination partner for orchard apples.",
  kin:["Apple","Hawthorn"], kinNote:"A true apple — five-petaled rose-family flowers, miniature fruit."},
 {common:"Flowering Dogwood", sci:"Cornus florida", type:"tree", fam:"Cornaceae", status:"native",
  bloom:{s:[4,26],p:[5,9],e:[5,24]},
  why:"The signature native of NJ woodland edges, opening after the pears finish. Its white ‘petals’ are actually bracts.",
  uses:"Hard wood once made shuttles and mallets; red fall berries feed migrating birds.",
  kin:["Cornelian Cherry","Kousa Dogwood"], kinNote:"A dogwood — four bracts cradle the true cluster of tiny flowers."},
 {common:"Black Locust", sci:"Robinia pseudoacacia", type:"tree", fam:"Fabaceae", status:"native",
  bloom:{s:[5,14],p:[5,23],e:[6,5]},
  why:"A pioneer of poor, disturbed ground — it fixes nitrogen and races up any roadcut or old field in late May.",
  uses:"The hardest, most rot-proof native wood, prized for fence posts. White flowers are intensely fragrant and bee-loved.",
  kin:["Redbud","Wisteria"], kinNote:"A legume — drooping white pea-flowers, paired thorns at the twigs."},
 {common:"Northern Catalpa", sci:"Catalpa speciosa", type:"tree", fam:"Bignoniaceae", status:"native",
  bloom:{s:[5,28],p:[6,12],e:[6,28]},
  why:"Tolerates rough, disturbed ground and city edges; once planted for shade and fence posts, now self-seeds along roads.",
  uses:"Rot-resistant wood for posts and ties; long dangling pods earn it the name ‘cigar tree.’",
  kin:["Trumpet Vine","Empress Tree"], kinNote:"Big bell flowers kin to the trumpet vine swallowing fences."},
 {common:"Tree of Heaven", sci:"Ailanthus altissima", type:"tree", fam:"Simaroubaceae", status:"invasive",
  bloom:{s:[6,1],p:[6,15],e:[7,3]},
  why:"The ultimate disturbance tree — sidewalk cracks, rail lines, road shoulders. It grows almost anywhere, fast.",
  uses:"Few good ones: it is the favored host of the spotted lanternfly, and crushed leaves smell rank.",
  kin:["Sumac (look-alike)"], kinNote:"Mistaken for sumac or walnut, but a crushed leaf’s foul smell gives it away."},
 {common:"Mimosa (Silktree)", sci:"Albizia julibrissin", type:"tree", fam:"Fabaceae", status:"invasive",
  bloom:{s:[6,20],p:[7,12],e:[8,18]},
  why:"An ornamental escaped from yards, favoring warm, sunny road edges and disturbed ground.",
  uses:"Planted for pink powderpuff flowers and fern-like leaves; little use once it goes wild.",
  kin:["Crown Vetch","Redbud"], kinNote:"A legume — which is why it turns up so readily on poor roadside soils."},

 // ---- SHRUBS & VINES ----
 {common:"Cornelian Cherry", sci:"Cornus mas", type:"shrub", fam:"Cornaceae", status:"naturalized",

let PLANTS = DEMO_PLANTS.map(p=>({...p}));

const today = new Date();

function yearFrac(d){const s=new Date(d.getFullYear(),0,1),n=new Date(d.getFullYear()+1,0,1);return (d-s)/(n-s);}
function monthFloat(d){return d.getMonth()+(d.getDate()-1)/daysInMonth(d.getFullYear(),d.getMonth());}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function sameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function interp(curve,mf){mf=((mf%12)+12)%12;const i=Math.floor(mf),f=mf-i;const a=curve[i%12],b=curve[(i+1)%12];return a+(b-a)*f;}

/* ---- accurate bloom windows: start / peak / end as day-of-year ---- */
const CUM=[0,31,59,90,120,151,181,212,243,273,304,334];
function doy(m,d){return CUM[m-1]+d;}
function todayDOY(d){return CUM[d.getMonth()]+d.getDate();}
function windowOf(p){
  if(p._w) return p._w;
  if(p.bloom) return (p._w={s:doy(p.bloom.s[0],p.bloom.s[1]),p:doy(p.bloom.p[0],p.bloom.p[1]),e:doy(p.bloom.e[0],p.bloom.e[1])});
  if(p.curve) return (p._w=curveToWindow(p.curve));
  return (p._w={s:0,p:0,e:0});
}
/* derive a window from a 12-pt monthly curve (used for live iNaturalist data) */
function curveToWindow(c){
  const max=Math.max(...c,1), th=max*0.25; let first=-1,last=-1,pk=0;
  for(let i=0;i<12;i++){ if(c[i]>=th){ if(first<0)first=i; last=i; } if(c[i]>c[pk])pk=i; }
  if(first<0){first=pk;last=pk;}
  return {s:doy(first+1,3), p:doy(pk+1,15), e:doy(last+1,27)};
}
/* triangular bloom level 0..1 across the year (for the sparkline) */
function levelAt(td,w){ if(td<=w.s||td>=w.e) return 0; return td<w.p ? (td-w.s)/Math.max(1,w.p-w.s) : (w.e-td)/Math.max(1,w.e-w.p); }
/* a 12-pt monthly curve generated from a window, cached on the plant */
function curveFor(p){ if(p.curve) return p.curve; const w=windowOf(p); const c=[]; for(let m=1;m<=12;m++) c.push(Math.round(levelAt(doy(m,15),w)*100)); return (p.curve=c); }

/* bloom stage on a day-of-year, straight from the window — no early bleed */
function stageOf(p, td){
  const w=windowOf(p);
  if(!w.e || td < w.s-18 || td > w.e+2) return "none";
  if(td < w.s) return "coming";
  const pw=Math.max(6, Math.min(22,(w.e-w.s)*0.20));
  if(Math.abs(td-w.p)<=pw) return "peak";
  if(td < w.p) return "opening";
  return "fading";
}
const IN_BLOOM = new Set(["opening","peak","fading"]);

/* ---- ribbon ------------------------------------------------------- */
const mw=document.getElementById("months");

const nowmark=document.getElementById("nowmark");
const ribbon=document.getElementById("ribbon");

function refreshRibbon(){
  const f=yearFrac(selDate);
  nowmark.style.left=(f*100)+"%";
  const mi=selDate.getMonth();
  [...mw.children].forEach((el,i)=>el.classList.toggle("on",Math.abs(i-mi)<=1));
  nowmark.setAttribute("aria-valuenow",Math.round(f*365)+1);
  nowmark.setAttribute("aria-valuetext",MONTH_FULL[selDate.getMonth()]+" "+selDate.getDate());
}
function refreshWhen(){
  document.getElementById("whenLabel").innerHTML="Your route &middot; "+MONTH_FULL[selDate.getMonth()]+" "+selDate.getDate();
  document.getElementById("todayBtn").classList.toggle("show",!sameDay(selDate,today));
}
function dateFromX(clientX){
  const r=ribbon.getBoundingClientRect();
  let f=(clientX-r.left)/r.width; f=Math.max(0,Math.min(0.99999,f));
  const start=new Date(selDate.getFullYear(),0,1);
  const ms=f*(new Date(selDate.getFullYear()+1,0,1)-start);
  return new Date(start.getTime()+ms);
}
let rafPending=false;
function setDate(d,full){
  selDate=d; refreshRibbon(); refreshWhen();
  if(full) renderList();
  else if(!rafPending){rafPending=true;requestAnimationFrame(()=>{rafPending=false;renderList();});}
}
let dragging=false;
function startDrag(e){dragging=true; if(e.pointerId!=null&&nowmark.setPointerCapture)nowmark.setPointerCapture(e.pointerId); moveDrag(e); e.preventDefault();}
function moveDrag(e){if(!dragging)return; const x=e.touches?e.touches[0].clientX:e.clientX; setDate(dateFromX(x),false);}
function endDrag(){if(dragging){dragging=false;renderList();}}
nowmark.addEventListener("pointerdown",startDrag);
window.addEventListener("pointermove",moveDrag);
window.addEventListener("pointerup",endDrag);
ribbon.addEventListener("pointerdown",e=>{if(e.target===nowmark)return; setDate(dateFromX(e.clientX),true);});
nowmark.addEventListener("keydown",e=>{
  let step=0; if(e.key==="ArrowLeft")step=-1; if(e.key==="ArrowRight")step=1; if(!step)return;
  if(e.shiftKey)step*=7; const d=new Date(selDate); d.setDate(d.getDate()+step); setDate(d,true); e.preventDefault();
});
document.getElementById("todayBtn").addEventListener("click",()=>setDate(new Date(),true));

/* ---- sparkline ---------------------------------------------------- */
function spark(curve,color,mf){
  const W=64,H=42,pad=3,n=curve.length,max=Math.max(...curve,1);
  const x=i=>pad+(i/(n-1))*(W-2*pad);
  const y=v=>H-pad-(v/max)*(H-2*pad);
  let d="M"+x(0)+" "+y(curve[0]); for(let i=1;i<n;i++)d+=" L"+x(i)+" "+y(curve[i]);
  const area=d+" L"+x(n-1)+" "+(H-pad)+" L"+x(0)+" "+(H-pad)+" Z";
  const nx=pad+(((mf%12)+12)%12)/(n-1)*(W-2*pad), ny=y(interp(curve,mf));
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" aria-hidden="true">
    <path d="${area}" fill="${color}" opacity=".14"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>
    <line x1="${nx}" y1="2" x2="${nx}" y2="${H-2}" stroke="${color}" stroke-width="1" stroke-dasharray="2 2" opacity=".7"/>
    <circle cx="${nx}" cy="${ny}" r="2.3" fill="${color}"/></svg>`;
}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function badges(p,stage){
  const st=p.status==="invasive"?"b-invasive":"b-native";
  const fam=p.fam?`<span class="badge b-fam">${esc(p.fam)}</span>`:"";
  const chip=`<span class="chip ${stage}"><span class="pip"></span>${STAGE_LABEL[stage]||""}</span>`;
  return `${chip}<span class="badge ${st}">${esc(p.status)}</span>${fam}`;
}
function linksHTML(arr){
  if(!arr||!arr.length) return `<div class="empty">No links yet. Be the first to add one.</div>`;
  return `<div class="links">`+arr.map(l=>
    `<a class="link" href="${l.url?esc(l.url):'#'}" ${l.url?'target="_blank" rel="noopener"':'onclick="return false"'}>
       <span class="src ${l.src||'art'}">${esc(l.label||'Link')}</span><span class="t">${esc(l.t||'')}</span></a>`).join("")+`</div>`;
}
const PARTS=["Flower","Leaf","Seed / fruit"];
function photosHTML(){
  return `<div class="photos">`+PARTS.map(part=>
    `<div class="photo shimmer" data-part="${part}"><div class="ph">&#127807;</div><span class="plabel">${part}</span></div>`).join("")
    +`</div><div class="photo-credit">photos: iNaturalist + Wikimedia · tap to enlarge & zoom</div>`;
}

let CARD_PLANT={};
function card(p,idx,mf){
  const td=todayDOY(selDate);
  const stage=stageOf(p, td);
  const c=STAGECOLOR[stage]||"#6a7560";
  CARD_PLANT[idx]=p;
  return `<div class="card" id="card${idx}">
    <div class="head" onclick="toggle(${idx})" role="button" aria-expanded="false">
      ${spark(curveFor(p),c,mf)}
      <div class="names">
        <div class="common">${esc(p.common)}</div>
        <div class="sci">${esc(p.sci)}</div>
        <div class="badges">${badges(p,stage)}</div>
      </div>
      <div class="chev">&rsaquo;</div>
    </div>
    <div class="body"><div class="body-inner">
      ${photosHTML()}
      <div class="layer"><div class="lh">Why it grows here</div><p>${esc(p.why)||'<span style="color:var(--muted)">No notes yet for this species.</span>'}</p></div>
      ${p.uses?`<div class="layer"><div class="lh">Uses</div><p>${esc(p.uses)}</p></div>`:""}
      ${p.kinNote?`<div class="layer"><div class="lh">Related plants</div><p>${esc(p.kinNote)}</p>
        <div class="kin">${(p.kin||[]).map(k=>`<span>${esc(k)}</span>`).join("")}</div></div>`:""}
      <div class="layer"><div class="lh">Learn more</div>
        ${linksHTML(p.links)}
        <div class="add">
          <button class="add-btn" onclick="showAdd(${idx})">+ Add a link</button>
          <div class="add-form" id="form${idx}">
            <input placeholder="Paste a YouTube or article link"><input placeholder="Short title">
            <div class="add-row"><button class="submit" onclick="submitAdd(${idx})">Submit</button>
              <button class="cancel" onclick="showAdd(${idx})">Cancel</button></div>
          </div><div id="pend${idx}"></div>
        </div>
      </div>
    </div></div>
  </div>`;
}

/* type group inside a section */
function typeGroup(items, mf, startIdx){
  let idx=startIdx, html="";
  TYPES.forEach(t=>{
    const list=items.filter(p=>(p.type||"ground")===t.key);
    if(!list.length) return;
    html+=`<div class="grp"><h3>${TYPE_ICON[t.icon]}${t.label}<span class="gc">${list.length}</span></h3>`;
    list.forEach(p=>{ html+=card(p,idx,mf); idx++; });
    html+=`</div>`;
  });
  return {html, next:idx};
}

const host=document.getElementById("stages");
function renderList(){
  const mf=monthFloat(selDate);
  const td=todayDOY(selDate);
  const openIds=new Set([...document.querySelectorAll(".card.open")].map(c=>c.id));
  CARD_PLANT={};
  const withStage=PLANTS.map(p=>({p, st:stageOf(p, td)}));
  const blooming=withStage.filter(x=>IN_BLOOM.has(x.st)).map(x=>x.p);
  const coming  =withStage.filter(x=>x.st==="coming").map(x=>x.p);
  // sort each by how far along / soon (peak first, then opening, then fading)
  const order={peak:0,opening:1,fading:2};
  blooming.sort((a,b)=>(order[stageOf(a,td)]-order[stageOf(b,td)]) || (interp(curveFor(b),mf)-interp(curveFor(a),mf)));

  let idx=0, html="";
  // ---- Section 1: In bloom now ----
  html+=`<section class="sec bloom"><h2>In bloom now<span class="cnt">${blooming.length} along route</span></h2>
         <p class="sec-sub">On ${MONTH_FULL[selDate.getMonth()]} ${selDate.getDate()} &middot; grouped by form, tagged by stage</p>`;
  if(blooming.length){ const g=typeGroup(blooming,mf,idx); html+=g.html; idx=g.next; }
  else html+=`<div class="grp"><div class="empty-grp">Nothing flowering on this date — drag the marker toward spring or summer.</div></div>`;
  html+=`</section>`;
  // ---- Section 2: Coming up ----
  html+=`<section class="sec coming"><h2>Coming up<span class="cnt">${coming.length} next</span></h2>
         <p class="sec-sub">About to open in the next few weeks</p>`;
  if(coming.length){ const g=typeGroup(coming,mf,idx); html+=g.html; idx=g.next; }
  else html+=`<div class="grp"><div class="empty-grp">Nothing waiting in the wings right now.</div></div>`;
  html+=`</section>`;

  host.innerHTML=html;
  openIds.forEach(id=>{const el=document.getElementById(id);
    if(el){el.classList.add("open"); const h=el.querySelector(".head"); if(h)h.setAttribute("aria-expanded","true");
      loadPhotos(el,CARD_PLANT[+id.replace("card","")]);}});
  document.getElementById("footCount").textContent=
    blooming.length+(blooming.length===1?" plant":" plants");
}

function toggle(i){const el=document.getElementById("card"+i);const open=el.classList.toggle("open");
  el.querySelector(".head").setAttribute("aria-expanded",open); if(open)loadPhotos(el,CARD_PLANT[i]);}
function showAdd(i){document.getElementById("form"+i).classList.toggle("show");}
function submitAdd(i){const f=document.getElementById("form"+i);f.classList.remove("show");
  f.querySelectorAll("input").forEach(x=>x.value="");
  document.getElementById("pend"+i).innerHTML=`<span class="pending">&#10003; Submitted &middot; pending review</span>`;}
window.toggle=toggle;window.showAdd=showAdd;window.submitAdd=submitAdd;

/* ===================================================================
   iNaturalist photos — THREE DISTINCT images per plant
   =================================================================== */
const INAT="https://api.inaturalist.org/v1";
const photoCache={};

async function loadPhotos(cardEl,plant){
  if(!plant) return;
  const tiles=cardEl.querySelectorAll(".photo");
  if(!tiles.length||cardEl.dataset.photos==="done"||cardEl.dataset.photos==="loading") return;
  cardEl.dataset.photos="loading";
  try{
    let photos=photoCache[plant.sci];
    if(!photos){ photos=await fetchPartPhotos(plant.sci, plant.common); photoCache[plant.sci]=photos; }
    tiles.forEach((tile,i)=>{
      const ph=photos[i];
      if(ph && ph.url){
        const img=new Image(); img.alt=plant.common+" \u2014 "+tile.dataset.part;
        img.onload=()=>{tile.classList.remove("shimmer");const p=tile.querySelector(".ph");if(p)p.remove();
          tile.insertBefore(img,tile.firstChild); requestAnimationFrame(()=>img.classList.add("loaded"));};
        img.onerror=()=>tile.classList.remove("shimmer");
        img.src=ph.url;
        tile.classList.add("clickable");
        tile.dataset.large=ph.large||ph.url;
        tile.dataset.credit=ph.credit||"";
        tile.dataset.caption=plant.common+" \u00b7 "+tile.dataset.part;
        tile.onclick=()=>openLightbox(tile.dataset.large, tile.dataset.caption, tile.dataset.credit);
      } else { tile.classList.remove("shimmer"); }
    });
    cardEl.dataset.photos="done";
  }catch(err){ tiles.forEach(t=>t.classList.remove("shimmer")); cardEl.dataset.photos=""; }
}

/* Part-specific photos: iNaturalist supplies the flower (always present), and
   Wikimedia Commons is the curated source for leaf and seed/fruit, searched by
   species + part. Each has a large version for the click-to-enlarge lightbox. */
async function fetchPartPhotos(sci, common){
  const seen=new Set();
  const inat=await inatPhotos(sci);
  async function pick(queries, fromIdx){
    for(const q of queries){
      const w=await wikiPhoto(q);
      if(w && !seen.has(w.url)){ seen.add(w.url); return w; }
    }
    for(let k=fromIdx;k<inat.length;k++){ if(!seen.has(inat[k].url)){ seen.add(inat[k].url); return inat[k]; } }
    return null;
  }
  let flower=null;
  if(inat[0] && !seen.has(inat[0].url)){ seen.add(inat[0].url); flower=inat[0]; }
  else flower=await pick([sci+" flower", sci+" inflorescence"], 0);
  const leaf=await pick([sci+" leaf", sci+" leaves", sci+" foliage"], 1);
  const seed=await pick([sci+" fruit", sci+" seed", sci+" seeds", sci+" pod"], 2);
  return [flower, leaf, seed];
}

/* iNaturalist photos (display + large) for a scientific name */
async function inatPhotos(sci){
  const out=[];
  const add=ph=>{ if(!ph) return; const m=ph.medium_url||ph.url; if(!m) return;
    out.push({url:m, large:(ph.large_url||m.replace("medium","large")), credit:"iNaturalist (CC)"}); };
  try{
    const r=await fetch(`${INAT}/taxa?q=${encodeURIComponent(sci)}&per_page=1&order_by=observations_count`);
    if(r.ok){
      const t=((await r.json()).results||[])[0];
      if(t){
        (t.taxon_photos||[]).forEach(tp=>add(tp.photo));
        add(t.default_photo);
        if(out.length<3 && t.id){
          const ro=await fetch(`${INAT}/observations?taxon_id=${t.id}&photos=true&quality_grade=research&order_by=votes&per_page=12`);
          if(ro.ok) ((await ro.json()).results||[]).forEach(o=>(o.photos||[]).forEach(ph=>{
            const sq=ph.url||""; const m=sq.replace("square","medium");
            if(m) out.push({url:m, large:sq.replace("square","large")||m, credit:"iNaturalist (CC)"}); }));
        }
      }
    }
  }catch(e){}
  const seen=new Set(); return out.filter(p=>!seen.has(p.url)&&seen.add(p.url));
}

/* one curated image from Wikimedia Commons matching "species part" */
async function wikiPhoto(query){
  try{
    const u="https://commons.wikimedia.org/w/api.php?action=query&format=json&origin=*"
      +"&generator=search&gsrnamespace=6&gsrlimit=4&gsrsearch="+encodeURIComponent(query)
      +"&prop=imageinfo&iiprop=url|extmetadata&iiurlwidth=900";
    const r=await fetch(u); if(!r.ok) return null;
    const pages=((await r.json()).query||{}).pages||{};
    const arr=Object.values(pages).sort((a,b)=>(a.index||0)-(b.index||0));
    for(const p of arr){
      const ii=(p.imageinfo||[])[0]; if(!ii) continue;
      if(/\.(svg|tif|tiff|pdf|webm|ogv)$/i.test(ii.url||"")) continue;
      const url=ii.thumburl||ii.url; if(!url) continue;
      const artist=(((ii.extmetadata||{}).Artist||{}).value||"").replace(/<[^>]+>/g,"").trim();
      return {url, large:ii.url||url, credit:(artist?artist+" \u00b7 ":"")+"Wikimedia Commons"};
    }
  }catch(e){}
  return null;
}

/* ===================================================================
   Route editor — geocode Start/Destination (Open-Meteo, CORS-friendly)
   =================================================================== */
const GEO="https://geocoding-api.open-meteo.com/v1/search";

async function geocode(q){
  const name=q.split(",")[0].trim();
  const r=await fetch(`${GEO}?name=${encodeURIComponent(name)}&count=5&language=en&format=json`);
  if(!r.ok) throw new Error("geocoder "+r.status);
  const list=((await r.json()).results)||[];
  if(!list.length) throw new Error('couldn’t find “'+q+'”');
  const us=list.filter(p=>p.country_code==="US");
  const p=us[0]||list[0];
  return {name:p.name+(p.admin1?", "+(STATE_ABBR[p.admin1]||p.admin1):""), lat:p.latitude, lng:p.longitude};
}
const STATE_ABBR={"New Jersey":"NJ","New York":"NY","Pennsylvania":"PA","Connecticut":"CT","Massachusetts":"MA","Maryland":"MD","Delaware":"DE","Virginia":"VA","California":"CA"};

async function floweringNear(lat,lng){
  const d2=new Date(),d1=new Date();d1.setDate(d1.getDate()-30);
  const iso=d=>d.toISOString().slice(0,10);
  const u=`${INAT}/observations/species_counts?lat=${lat}&lng=${lng}&radius=15`
        +`&iconic_taxa=Plantae&term_id=12&term_value_id=13&quality_grade=research`
        +`&d1=${iso(d1)}&d2=${iso(d2)}&per_page=40`;
  const r=await fetch(u); if(!r.ok) throw new Error("species "+r.status);
  return (await r.json()).results||[];
}
async function monthlyCurve(taxonId){
  try{
    const u=`${INAT}/observations/histogram?taxon_id=${taxonId}&date_field=observed&interval=month_of_year&term_id=12&term_value_id=13`;
    const r=await fetch(u); if(!r.ok) return null;
    const h=(await r.json()).results.month_of_year, curve=[];
    for(let m=1;m<=12;m++) curve.push(h[m]||h[String(m)]||0);
    const max=Math.max(...curve,1); return curve.map(v=>Math.round(v/max*100));
  }catch(e){ return null; }
}
function statusOf(t){
  const e=t.establishment_means&&(t.establishment_means.establishment_means||t.establishment_means);
  if(e==="introduced") return "invasive"; if(e==="native"||e==="endemic") return "native"; return "naturalized";
}
const TREE_WORDS=/maple|oak|pear|cherry|locust|pine|birch|ash|elm|willow|catalpa|dogwood|magnolia|redbud|ailanthus|mimosa|linden|poplar|sycamore|hickory|walnut|sweetgum|spruce|cedar|hawthorn|crabapple|tree/i;
const SHRUB_WORDS=/rose|viburnum|lilac|forsythia|honeysuckle|sumac|hydrangea|azalea|rhododendron|blackberry|raspberry|bramble|privet|barberry|knotweed|wisteria|shrub|bush|holly|dogbane/i;
const LAWN_WORDS=/clover|dandelion|plantain|violet|speedwell|chickweed|ground ivy|creeping|buttercup|henbit|dead-?nettle|medic|sorrel/i;
function classifyType(name){ if(TREE_WORDS.test(name))return "tree"; if(SHRUB_WORDS.test(name))return "shrub"; if(LAWN_WORDS.test(name))return "lawn"; return "wild"; }

const editBtn=document.getElementById("editBtn"), routeEdit=document.getElementById("routeEdit"),
      reStatus=document.getElementById("reStatus"), fromInput=document.getElementById("fromInput"),
      toInput=document.getElementById("toInput");
function openEditor(){routeEdit.classList.add("show");
  fromInput.value=document.getElementById("fromLabel").textContent.trim();
  toInput.value=document.getElementById("toLabel").textContent.trim();
  reStatus.textContent="";reStatus.classList.remove("err");fromInput.focus();}
function closeEditor(){routeEdit.classList.remove("show");}
editBtn.addEventListener("click",()=>routeEdit.classList.contains("show")?closeEditor():openEditor());
document.getElementById("reCancel").addEventListener("click",closeEditor);
document.getElementById("reGo").addEventListener("click",updateRoute);
toInput.addEventListener("keydown",e=>{if(e.key==="Enter")updateRoute();});
fromInput.addEventListener("keydown",e=>{if(e.key==="Enter")toInput.focus();});

async function updateRoute(){
  const from=fromInput.value.trim(), to=toInput.value.trim();
  if(!from||!to){ setStatus("Enter both a start and a destination.",true); return; }
  setStatus("Looking up “"+from+"” and “"+to+"”…");
  try{
    const [A,B]=await Promise.all([geocode(from),geocode(to)]);
    setStatus("Found "+A.name+" → "+B.name+". Asking iNaturalist what’s flowering…");
    const mid={lat:(A.lat+B.lat)/2,lng:(A.lng+B.lng)/2};
    const lists=await Promise.all([floweringNear(A.lat,A.lng),floweringNear(mid.lat,mid.lng),floweringNear(B.lat,B.lng)]);
    const agg={};
    lists.forEach(list=>list.forEach(row=>{const t=row.taxon;if(!t)return;
      const a=agg[t.id]||(agg[t.id]={taxon:t,count:0,pts:0}); a.count+=row.count; a.pts+=1;}));
    let ranked=Object.values(agg).sort((x,y)=>(y.pts-x.pts)||(y.count-x.count)).slice(0,18);
    if(!ranked.length){ setStatus("No flowering observations found along that route right now.",true); return; }
    setStatus("Building bloom curves for "+ranked.length+" species…");
    const built=await Promise.all(ranked.map(async a=>{
      const t=a.taxon, curve=(await monthlyCurve(t.id))||[0,0,2,10,40,75,85,70,40,12,2,0];
      const name=(t.preferred_common_name||t.name||"Unknown").replace(/\b\w/g,m=>m.toUpperCase());
      return {common:name, sci:t.name||"", type:classifyType(name+" "+(t.name||"")), fam:"",
        status:statusOf(t), curve, why:"", uses:"", kin:[], kinNote:"",
        links:t.id?[{src:"inat",label:"iNat",t:"View on iNaturalist",url:"https://www.inaturalist.org/taxa/"+t.id}]:[]};
    }));
    PLANTS=built; LIVE=true;
    document.getElementById("fromLabel").textContent=shortName(A.name);
    document.getElementById("toLabel").textContent=shortName(B.name);
    renderList();
    setStatus("✓ Updated — "+built.length+" species along "+shortName(A.name)+" → "+shortName(B.name));
    setTimeout(closeEditor,1400);
  }catch(err){ setStatus("Couldn’t update: "+err.message+". Showing the previous route.",true); }
}
function setStatus(m,e){reStatus.textContent=m;reStatus.classList.toggle("err",!!e);}
function shortName(s){return s.split(",")[0].trim();}

/* ---- click-to-enlarge lightbox with pinch / double-tap zoom ---- */
const lightbox=document.getElementById("lightbox"), lbImg=document.getElementById("lbImg"), lbCap=document.getElementById("lbCap");
let lbScale=1, lbX=0, lbY=0; const lbPts=new Map(); let lbStartDist=0, lbStartScale=1, lbMoved=false;
function lbApply(){ lbImg.style.transform=`translate(${lbX}px,${lbY}px) scale(${lbScale})`; }
function lbReset(){ lbScale=1; lbX=0; lbY=0; lbApply(); }
function lbDist(a,b){ return Math.hypot(a.clientX-b.clientX, a.clientY-b.clientY); }
function openLightbox(src,caption,credit){
  if(!src) return;
  lbReset();
  lbImg.src=src; lbImg.alt=caption||"";
  lbCap.innerHTML=esc(caption||"")+(credit?`<span class="cr">${esc(credit)}</span>`:"");
  lightbox.classList.add("show");
}
function closeLightbox(){ lightbox.classList.remove("show"); lbReset(); lbImg.removeAttribute("src"); }
lightbox.addEventListener("click",e=>{ if(e.target===lbImg) return; closeLightbox(); });
document.getElementById("lbClose").addEventListener("click",e=>{e.stopPropagation();closeLightbox();});
document.addEventListener("keydown",e=>{ if(e.key==="Escape"&&lightbox.classList.contains("show")) closeLightbox(); });
lbImg.addEventListener("pointerdown",e=>{ e.preventDefault(); lbImg.setPointerCapture(e.pointerId);
  lbPts.set(e.pointerId,e); lbMoved=false;
  if(lbPts.size===2){ const a=[...lbPts.values()]; lbStartDist=lbDist(a[0],a[1])||1; lbStartScale=lbScale; } });
lbImg.addEventListener("pointermove",e=>{ if(!lbPts.has(e.pointerId)) return; const prev=lbPts.get(e.pointerId); lbPts.set(e.pointerId,e);
  if(lbPts.size===2){ const a=[...lbPts.values()]; const d=lbDist(a[0],a[1]); lbScale=Math.max(1,Math.min(5,lbStartScale*d/lbStartDist)); lbMoved=true; lbApply(); }
  else if(lbPts.size===1 && lbScale>1){ lbX+=e.clientX-prev.clientX; lbY+=e.clientY-prev.clientY; lbMoved=true; lbApply(); } });
function lbUp(e){ lbPts.delete(e.pointerId);
  if(lbPts.size===0){
    if(!lbMoved && lbScale<=1.02) closeLightbox();
    else if(lbScale<=1.02) lbReset();
  } }
lbImg.addEventListener("pointerup",lbUp);
lbImg.addEventListener("pointercancel",e=>lbPts.delete(e.pointerId));
lbImg.addEventListener("dblclick",e=>{ e.preventDefault(); e.stopPropagation(); if(lbScale>1) lbReset(); else { lbScale=2.5; lbApply(); } });
window.openLightbox=openLightbox;

/* ---- boot --------------------------------------------------------- */
refreshRibbon(); refreshWhen(); renderList();
</script>
<div id="lightbox" role="dialog" aria-modal="true" aria-label="Enlarged photo">
  <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
  <img id="lbImg" alt="">
  <div class="lb-cap" id="lbCap"></div>
  <div class="lb-hint">pinch or double-tap to zoom · tap outside to close</div>
</div>
